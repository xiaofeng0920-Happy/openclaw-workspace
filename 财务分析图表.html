<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>财务分析图表 - TWO CITIES GLOBAL ASSET MANAGEMENT LIMITED</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            background: #f5f5f5;
            padding: 20px;
            margin: 0;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
        }
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }
        .chart-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 20px;
        }
        .chart-container {
            background: white;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .chart-container.full-width {
            grid-column: span 2;
        }
        .chart-title {
            font-size: 16px;
            font-weight: bold;
            color: #333;
            margin-bottom: 15px;
            text-align: center;
        }
        canvas {
            max-height: 400px;
        }
        .legend {
            margin-top: 15px;
            padding: 15px;
            background: #f9f9f9;
            border-radius: 4px;
        }
        .legend-item {
            display: inline-block;
            margin-right: 20px;
            margin-bottom: 5px;
        }
        .legend-color {
            display: inline-block;
            width: 16px;
            height: 16px;
            margin-right: 5px;
            border-radius: 3px;
        }
        @media (max-width: 1024px) {
            .chart-grid {
                grid-template-columns: 1fr;
            }
            .chart-container.full-width {
                grid-column: span 1;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>财务分析图表</h1>
        <p class="subtitle">TWO CITIES GLOBAL ASSET MANAGEMENT LIMITED | 2024 年 7 月 - 2026 年 2 月</p>
        
        <div class="chart-grid">
            <!-- 资金流动趋势图 -->
            <div class="chart-container full-width">
                <div class="chart-title">资金流动趋势图 (2024-08 至 2026-02)</div>
                <canvas id="trendChart"></canvas>
                <div class="legend">
                    <div class="legend-item"><span class="legend-color" style="background: #4472C4;"></span>总资产</div>
                    <div class="legend-item"><span class="legend-color" style="background: #ED7D31;"></span>关键事件</div>
                </div>
            </div>
            
            <!-- 月度收支对比图 -->
            <div class="chart-container">
                <div class="chart-title">月度收支对比图</div>
                <canvas id="incomeExpenseChart"></canvas>
            </div>
            
            <!-- 资金周期分析图 -->
            <div class="chart-container">
                <div class="chart-title">资金周期分析图</div>
                <canvas id="cycleChart"></canvas>
            </div>
            
            <!-- 支出分类饼图 -->
            <div class="chart-container">
                <div class="chart-title">支出分类饼图</div>
                <canvas id="expensePieChart"></canvas>
            </div>
            
            <!-- 月度总资产变化 -->
            <div class="chart-container">
                <div class="chart-title">月度总资产变化</div>
                <canvas id="monthlyAssetChart"></canvas>
            </div>
        </div>
    </div>
    
    <script>
        // 资金流动趋势图
        const trendCtx = document.getElementById('trendChart').getContext('2d');
        new Chart(trendCtx, {
            type: 'line',
            data: {
                labels: ['2024-08', '2024-09', '2024-10', '2024-11', '2024-12', '2025-01', '2025-02', '2025-04', '2025-05', '2025-06', '2025-07', '2025-08', '2025-09', '2025-10', '2025-11', '2025-12', '2026-01', '2026-02'],
                datasets: [{
                    label: '总资产 (HKD)',
                    data: [4172281.85, 3194894.92, 2330340.82, 1312423.52, 515433.59, 108216.85, 193615.76, 550458.76, 372549.04, 566596.22, 1893788.62, 1600100.92, 1278780.78, 1355076.71, 1167688.92, 2231845.43, 1659566.83, 1567190.75],
                    borderColor: '#4472C4',
                    backgroundColor: 'rgba(68, 114, 196, 0.1)',
                    borderWidth: 3,
                    fill: true,
                    tension: 0.4,
                    pointRadius: 5,
                    pointHoverRadius: 7
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: true,
                plugins: {
                    tooltip: {
                        callbacks: {
                            label: function(context) {
                                return 'HKD ' + context.parsed.y.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
                            }
                        }
                    },
                    annotation: {
                        annotations: {
                            line1: {
                                type: 'line',
                                xMin: 6,
                                xMax: 6,
                                borderColor: 'red',
                                borderWidth: 2,
                                borderDash: [5, 5],
                                label: {
                                    content: '最低点',
                                    enabled: true
                                }
                            }
                        }
                    }
                },
                scales: {
                    y: {
                        beginAtZero: false,
                        ticks: {
                            callback: function(value) {
                                return (value / 10000).toFixed(0) + '万';
                            }
                        }
                    }
                }
            }
        });
        
        // 月度收支对比图
        const incomeExpenseCtx = document.getElementById('incomeExpenseChart').getContext('2d');
        new Chart(incomeExpenseCtx, {
            type: 'bar',
            data: {
                labels: ['2024-08', '2024-09', '2024-11', '2024-12', '2025-01', '2025-02', '2025-04', '2025-05', '2025-07', '2025-08', '2025-09', '2025-10', '2025-11', '2025-12', '2026-01', '2026-02'],
                datasets: [
                    {
                        label: '月存入',
                        data: [21359.29, 1245.91, 299.28, 2409.24, 27.59, 200005.52, 83.42, 45.15, 1000054.06, 106.34, 59.31, 18.25, 777266.46, 1509251.80, 15301.35, 0.91],
                        backgroundColor: '#70AD47',
                    },
                    {
                        label: '月支出',
                        data: [428494.00, 978021.50, 1018633.67, 438176.48, 407370.00, 268255.00, 495415.00, 239470.00, 356964.74, 205000.00, 472948.68, 170809.20, 297805.52, 444944.36, 490225.00, 184294.52],
                        backgroundColor: '#FF6B6B',
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: true,
                plugins: {
                    tooltip: {
                        callbacks: {
                            label: function(context) {
                                return context.dataset.label + ': HKD ' + context.parsed.y.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
                            }
                        }
                    }
                },
                scales: {
                    y: {
                        beginAtZero: true,
                        ticks: {
                            callback: function(value) {
                                return (value / 10000).toFixed(0) + '万';
                            }
                        }
                    }
                }
            }
        });
        
        // 资金周期分析图
        const cycleCtx = document.getElementById('cycleChart').getContext('2d');
        new Chart(cycleCtx, {
            type: 'line',
            data: {
                labels: ['2024-08', '2024-09', '2024-10', '2024-11', '2024-12', '2025-01', '2025-02', '2025-04', '2025-05', '2025-06', '2025-07', '2025-08', '2025-09', '2025-10', '2025-11', '2025-12', '2026-01', '2026-02'],
                datasets: [
                    {
                        label: '流出期 (2024-08 至 2025-02)',
                        data: [4172281.85, 3194894.92, 2330340.82, 1312423.52, 515433.59, 108216.85, 193615.76, null, null, null, null, null, null, null, null, null, null, null],
                        borderColor: '#FF6B6B',
                        backgroundColor: 'rgba(255, 107, 107, 0.2)',
                        borderWidth: 2,
                        fill: true,
                        tension: 0.4
                    },
                    {
                        label: '恢复期 (2025-03 至 2025-07)',
                        data: [null, null, null, null, null, null, 193615.76, 550458.76, 372549.04, 566596.22, 1893788.62, null, null, null, null, null, null, null],
                        borderColor: '#FFD93D',
                        backgroundColor: 'rgba(255, 217, 61, 0.2)',
                        borderWidth: 2,
                        fill: true,
                        tension: 0.4
                    },
                    {
                        label: '增长期 (2025-08 至 2025-12)',
                        data: [null, null, null, null, null, null, null, null, null, null, 1893788.62, 1600100.92, 1278780.78, 1355076.71, 1167688.92, 2231845.43, null, null],
                        borderColor: '#70AD47',
                        backgroundColor: 'rgba(112, 173, 71, 0.2)',
                        borderWidth: 2,
                        fill: true,
                        tension: 0.4
                    },
                    {
                        label: '消耗期 (2026-01 至 2026-02)',
                        data: [null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, 2231845.43, 1659566.83, 1567190.75],
                        borderColor: '#FF9F43',
                        backgroundColor: 'rgba(255, 159, 67, 0.2)',
                        borderWidth: 2,
                        fill: true,
                        tension: 0.4
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: true,
                plugins: {
                    tooltip: {
                        callbacks: {
                            label: function(context) {
                                if (context.parsed.y !== null) {
                                    return context.dataset.label + ': HKD ' + context.parsed.y.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
                                }
                                return null;
                            }
                        }
                    }
                },
                scales: {
                    y: {
                        beginAtZero: false,
                        ticks: {
                            callback: function(value) {
                                return (value / 10000).toFixed(0) + '万';
                            }
                        }
                    }
                }
            }
        });
        
        // 支出分类饼图
        const expensePieCtx = document.getElementById('expensePieChart').getContext('2d');
        new Chart(expensePieCtx, {
            type: 'pie',
            data: {
                labels: ['工资薪酬', '专业服务', '大额转账', '汇款支出', '其他'],
                datasets: [{
                    data: [35, 25, 20, 15, 5],
                    backgroundColor: [
                        '#4472C4',
                        '#ED7D31',
                        '#A5A5A5',
                        '#FFC000',
                        '#5B9BD5'
                    ],
                    borderWidth: 2,
                    borderColor: '#fff'
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: true,
                plugins: {
                    legend: {
                        position: 'bottom',
                    },
                    tooltip: {
                        callbacks: {
                            label: function(context) {
                                return context.label + ': ' + context.parsed + '%';
                            }
                        }
                    }
                }
            }
        });
        
        // 月度总资产变化图
        const monthlyAssetCtx = document.getElementById('monthlyAssetChart').getContext('2d');
        new Chart(monthlyAssetCtx, {
            type: 'bar',
            data: {
                labels: ['2024-08', '2024-09', '2024-10', '2024-11', '2024-12', '2025-01', '2025-02', '2025-04', '2025-05', '2025-06', '2025-07', '2025-08', '2025-09', '2025-10', '2025-11', '2025-12', '2026-01', '2026-02'],
                datasets: [{
                    label: '月度总资产 (HKD)',
                    data: [4172281.85, 3194894.92, 2330340.82, 1312423.52, 515433.59, 108216.85, 193615.76, 550458.76, 372549.04, 566596.22, 1893788.62, 1600100.92, 1278780.78, 1355076.71, 1167688.92, 2231845.43, 1659566.83, 1567190.75],
                    backgroundColor: 'rgba(68, 114, 196, 0.7)',
                    borderColor: '#4472C4',
                    borderWidth: 1
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: true,
                plugins: {
                    tooltip: {
                        callbacks: {
                            label: function(context) {
                                return 'HKD ' + context.parsed.y.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
                            }
                        }
                    }
                },
                scales: {
                    y: {
                        beginAtZero: false,
                        ticks: {
                            callback: function(value) {
                                return (value / 10000).toFixed(0) + '万';
                            }
                        }
                    }
                }
            }
        });
    </script>
</body>
</html>
